<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>noter</title>
  <style>
    @font-face {
      font-family: 'Geist';
      src: local('Geist'), local('Geist Regular');
      font-style: normal;
      font-weight: 100 900;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Blue “frame” + dark card share concentric radii (22px card + 8px ring → 30px outer). */
    html {
      background: #2563eb;
      border-radius: 30px;
      overflow: hidden;
    }

    body {
      box-sizing: border-box;
      width: 336px;
      margin: 0;
      padding: 8px;
      background: transparent;
      color: #e5e5e5;
      font-family: 'Geist', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      min-height: 120px;
    }

    .popup-shell {
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0,0,0,0.42);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 14px 16px 13px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .header-icon {
      width: 28px;
      height: 28px;
      background: #f97316;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { color: #fff; }
    .header-text h1 {
      font-size: 13px;
      font-weight: 700;
      color: #f5f5f5;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 10.5px;
      color: #6f6f6f;
      margin-top: 1px;
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transition: background 0.3s;
    }
    .toggle-row.is-active {
      background: rgba(249, 115, 22, 0.06);
    }
    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toggle-label strong {
      font-size: 12.5px;
      font-weight: 600;
      color: #e5e5e5;
    }
    .toggle-label small {
      font-size: 10.5px;
      color: #6f6f6f;
      transition: color 0.3s;
    }
    .toggle-row.is-active .toggle-label small {
      color: #f97316;
    }

    /* ── Switch ── */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .switch input { display: none; }
    .switch-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      transition: background 0.25s, box-shadow 0.25s;
    }
    .switch-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #737373;
      transition: transform 0.25s, background 0.25s;
    }
    .switch input:checked ~ .switch-track {
      background: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.2), 0 0 14px rgba(249,115,22,0.4);
      animation: glow-pulse 2s ease-in-out infinite;
    }
    .switch input:checked ~ .switch-thumb {
      transform: translateX(18px);
      background: #fff;
    }
    @keyframes glow-pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(249,115,22,0.2), 0 0 14px rgba(249,115,22,0.4); }
      50%      { box-shadow: 0 0 0 3px rgba(249,115,22,0.3), 0 0 22px rgba(249,115,22,0.6); }
    }

    /* ── Sessions list ── */
    .sessions {
      display: flex;
      flex-direction: column;
    }
    .sessions-empty {
      padding: 22px 16px;
      text-align: center;
      font-size: 11.5px;
      color: #6f6f6f;
      line-height: 1.6;
    }
    .sessions-empty strong {
      display: block;
      color: #8a8a8a;
      font-size: 12px;
      margin-bottom: 3px;
    }

    /* ── Session item ── */
    .session-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.12s;
    }
    .session-item:hover { background: rgba(255,255,255,0.03); }
    .session-info { flex: 1; overflow: hidden; }
    .session-title {
      font-size: 12px;
      font-weight: 500;
      color: #d4d4d4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      font-size: 10.5px;
      color: #6b6b6b;
      margin-top: 2px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .session-count { font-weight: 600; color: #737373; }
    .session-dot {
      width: 2px; height: 2px;
      border-radius: 50%;
      background: #404040;
      flex-shrink: 0;
    }
    .session-time { color: #6b6b6b; }

    /* ── In-progress item ── */
    .session-item.is-inprogress {
      background: rgba(249,115,22,0.05);
      border-bottom-color: rgba(249,115,22,0.12);
    }
    .session-item.is-inprogress .session-title { color: #e5e5e5; }
    .inprogress-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10.5px;
      font-weight: 600;
      color: #f97316;
    }
    .inprogress-badge .pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f97316;
      flex-shrink: 0;
      animation: pip-pulse 1.4s ease-in-out infinite;
    }
    @keyframes pip-pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Session action buttons ── */
    .session-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .action-btn {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #737373;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      position: relative;
      gap: 6px;
    }
    .action-btn.copy-btn {
      width: auto;
      min-width: 62px;
      padding: 0 9px;
    }
    .action-btn .action-text {
      font-size: 10.5px;
      font-weight: 600;
      line-height: 1;
    }
    .action-btn:hover {
      background: rgba(249,115,22,0.12);
      border-color: rgba(249,115,22,0.35);
      color: #f97316;
    }
    .action-btn.copied { color: #22c55e; border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.07); }

    /* ── Error state ── */
    #error-msg {
      display: none;
      margin: 10px 16px 0;
      padding: 9px 12px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      font-size: 11px;
      color: #f87171;
      line-height: 1.5;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px 11px;
      text-align: center;
      font-size: 10px;
      color: #6b6b6b;
    }
  </style>
</head>
<body>
  <div class="popup-shell">

  <div class="header">
    <div class="header-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>noter</h1>
      <p>Select elements · add notes · export</p>
    </div>
  </div>

  <div class="toggle-row" id="toggle-row">
    <div class="toggle-label">
      <strong>Noting: <span id="toggle-sub">OFF</span></strong>
    </div>
    <label class="switch">
      <input type="checkbox" id="mode-switch" />
      <div class="switch-track"></div>
      <div class="switch-thumb"></div>
    </label>
  </div>

  <div id="error-msg"></div>

  <div class="sessions" id="sessions-list"></div>

  <div class="footer">Sessions saved per page · Esc to stop</div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
